model = "gpt-5.4"
model_reasoning_effort = "high"
hide_agent_reasoning = true
network_access = true

notify = ["bash", "-lc", "afplay /System/Library/Sounds/Ping.aiff"]

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users/a-hirata/projects", "/Users/a-hirata/Desktop"]

[mcp_servers.figma]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.figma.com/mcp"]

[projects."/Users/a-hirata"]
trust_level = "trusted"

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"
